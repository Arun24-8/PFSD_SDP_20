{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - MediConnect</title>
    <link rel="stylesheet" href="{% static 'dashboard/css/login.css' %}" />
  </head>
  <body>
    <div class="login-shell">
      <div class="login-card">
        <div class="login-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1v4"></path>
            <path d="M12 19v4"></path>
            <path d="M4.22 4.22l2.83 2.83"></path>
            <path d="M16.95 16.95l2.83 2.83"></path>
            <path d="M1 12h4"></path>
            <path d="M19 12h4"></path>
            <path d="M4.22 19.78l2.83-2.83"></path>
            <path d="M16.95 7.05l2.83-2.83"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </div>

        <h1>Forgot Password</h1>
        <p class="trial-link">Reset your password to continue using MediConnect</p>

        <form class="login-form" method="post">
          {% csrf_token %}
          <div class="form-field">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" placeholder="user@example.com" required />
          </div>

          <button type="submit" class="btn-signin">Send Reset Link</button>

          <div class="login-actions">
            <a href="{% url 'login' %}" class="action-link">Back to sign in</a>
          </div>
        </form>
      </div>

      <button class="floating-help" aria-label="Help">
        <span class="floating-help-icon">?</span>
      </button>
    </div>
  </body>
</html>
