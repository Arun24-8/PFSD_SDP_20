{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in - MediConnect</title>
    <link rel="stylesheet" href="{% static 'dashboard/css/login.css' %}" />
  </head>
  <body>
    <div class="login-shell">
      <div class="login-card">
        <div class="login-icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="48"
            height="48"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>

        <h1>Sign in to your account</h1>
        <p class="trial-link">
          Or <a href="#">start your 14-day free trial</a>
        </p>

        <form class="login-form" method="post">
          {% csrf_token %}
          {% if error %}
          <div class="form-error">{{ error }}</div>
          {% endif %}

          <div class="role-selector">
            <label>I am a...</label>
            <div class="role-options">
              <input
                type="radio"
                name="role"
                id="role-patient"
                value="patient"
                {% if request.POST.role == 'patient' or not request.POST.role %}checked{% endif %}
              />
              <label for="role-patient" class="role-btn">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>Patient</span>
              </label>

              <input type="radio" name="role" id="role-doctor" value="doctor" {% if request.POST.role == 'doctor' %}checked{% endif %} />
              <label for="role-doctor" class="role-btn">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
                </svg>
                <span>Doctor</span>
              </label>

              <input type="radio" name="role" id="role-admin" value="admin" {% if request.POST.role == 'admin' %}checked{% endif %} />
              <label for="role-admin" class="role-btn">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <rect
                    x="3"
                    y="11"
                    width="18"
                    height="11"
                    rx="2"
                    ry="2"
                  ></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <span>Admin</span>
              </label>
            </div>
          </div>

          <div class="form-field">
            <label for="email">Username or Email</label>
            <input
              type="text"
              id="email"
              name="email"
              placeholder="admin or user@example.com"
              value="{{ request.POST.email }}"
              required
            />
          </div>

          <div class="form-field">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
            />
          </div>

          <button type="submit" class="btn-signin">Sign in</button>
        
        <div class="login-actions" id="login-actions">
          <a href="{% url 'forgot_password' %}" class="action-link">Forgot password?</a>
          <a href="{% url 'create_user' %}" class="action-link">Create user</a>
        </div>
        </form>
        <script>
          (function(){
            const patientRadio = document.getElementById('role-patient');
            const doctorRadio = document.getElementById('role-doctor');
            const adminRadio = document.getElementById('role-admin');
            const actions = document.getElementById('login-actions');

            function updateActions(){
              if(patientRadio.checked){
                actions.style.display = 'flex';
              } else {
                actions.style.display = 'none';
              }
            }

            // initial
            updateActions();

            [patientRadio, doctorRadio, adminRadio].forEach(r => {
              r.addEventListener('change', updateActions);
            });
          })();
        </script>
      </div>

      <button class="floating-help" aria-label="Help">
        <span class="floating-help-icon">?</span>
      </button>
    </div>
  </body>
</html>
