{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create User - MediConnect</title>
    <link rel="stylesheet" href="{% static 'dashboard/css/login.css' %}" />
  </head>
  <body>
    <div class="login-shell">
      <div class="login-card">
        <div class="login-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
            <path d="M12 11v6"></path>
            <path d="M9 14h6"></path>
          </svg>
        </div>

        <h1>Create User</h1>
        <p class="trial-link">Create a new account for MediConnect access</p>

        <form class="login-form" method="post">
          {% csrf_token %}
          
          {% if error %}
          <div class="form-error">{{ error }}</div>
          {% endif %}
          
          {% if success %}
          <div class="form-success">{{ success }}</div>
          {% endif %}
          
          <div class="form-field">
            <label for="full_name">Full Name</label>
            <input type="text" id="full_name" name="full_name" placeholder="Your full name" value="{{ full_name }}" required />
          </div>

          <div class="form-field">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" placeholder="user@example.com" value="{{ email }}" required />
          </div>

          <div class="form-field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Create password (min 6 characters)" required />
          </div>

          <button type="submit" class="btn-signin">Create Account</button>

          <div class="login-actions">
            <a href="{% url 'login' %}" class="action-link">Back to sign in</a>
          </div>
        </form>
      </div>

      <button class="floating-help" aria-label="Help">
        <span class="floating-help-icon">?</span>
      </button>
    </div>
  </body>
</html>
